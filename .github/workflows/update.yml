name: Daily News Update

on:
  schedule:
    # GitHub runs cron in UTC and does NOT observe daylight saving, so we list both:
    #   15:17 UTC = 11:17 AM EDT (summer, Mar–Nov)
    #   16:17 UTC = 11:17 AM EST (winter, Nov–Mar)
    # Both fire year-round; the "off-season" one just runs ~an hour off and refreshes again (harmless).
    # Minute :17 (not :00) is used because GitHub frequently delays/drops on-the-hour scheduled jobs.
    - cron: "17 15 * * *"
    - cron: "17 16 * * *"
  workflow_dispatch: # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run aggregator
        run: python scripts/aggregate.py

      - name: Commit & push updated HTML
        run: |
          git config user.name  "BlueWaveBot"
          git config user.email "bot@bluewavebeacon.com"
          git add index.html feed.xml sitemap.xml archive.html archive/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily feed update $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Push with rebase + retry to survive races with any concurrent commits
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "All push attempts failed." >&2
          exit 1
