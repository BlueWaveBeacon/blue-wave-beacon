name: Daily News Update

on:
  schedule:
    # GitHub's scheduler is unreliable (it silently drops many runs), so we schedule
    # SEVERAL attempts across the late-morning/midday window. The workflow is idempotent:
    # if the news hasn't changed since the last run it commits nothing, so extra runs are
    # harmless. Times are UTC (GitHub does not observe daylight saving).
    #   14:17 UTC = 10:17 EDT / 09:17 EST
    #   15:17 UTC = 11:17 EDT / 10:17 EST
    #   16:17 UTC = 12:17 EDT / 11:17 EST
    #   17:17 UTC = 13:17 EDT / 12:17 EST
    # Minute :17 (not :00) avoids the top-of-hour window GitHub delays most.
    - cron: "17 14 * * *"
    - cron: "17 15 * * *"
    - cron: "17 16 * * *"
    - cron: "17 17 * * *"
  workflow_dispatch: # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run aggregator
        run: python scripts/aggregate.py

      - name: Commit & push updated HTML
        run: |
          git config user.name  "BlueWaveBot"
          git config user.email "bot@bluewavebeacon.com"
          git add index.html feed.xml sitemap.xml archive.html archive/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily feed update $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Push with rebase + retry to survive races with any concurrent commits
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "All push attempts failed." >&2
          exit 1
