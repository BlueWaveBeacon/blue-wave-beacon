name: Daily News Update

on:
  schedule:
    # GitHub's scheduler is unreliable (it silently drops many runs), so we schedule
    # SEVERAL attempts across the day. The workflow is idempotent: if the news hasn't
    # changed since the last run it commits nothing, so extra runs are harmless.
    # Times are UTC (GitHub does NOT observe daylight saving), tuned for Eastern Time.
    # During EDT (summer, UTC-4) these fire at the target ET times below; during EST
    # (winter, UTC-5) they fire one hour earlier in ET (8:50/10:50/1:50/3:50/5:50).
    #   13:50 UTC =  9:50 AM EDT
    #   15:50 UTC = 11:50 AM EDT
    #   18:50 UTC =  2:50 PM EDT
    #   20:50 UTC =  4:50 PM EDT
    #   22:50 UTC =  6:50 PM EDT
    - cron: "50 13 * * *"
    - cron: "50 15 * * *"
    - cron: "50 18 * * *"
    - cron: "50 20 * * *"
    - cron: "50 22 * * *"
  workflow_dispatch: # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run aggregator
        run: python scripts/aggregate.py

      - name: Commit & push updated HTML
        run: |
          git config user.name  "BlueWaveBot"
          git config user.email "bot@bluewavebeacon.com"
          git add index.html feed.xml sitemap.xml archive.html archive/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily feed update $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Push with rebase + retry to survive races with any concurrent commits
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "All push attempts failed." >&2
          exit 1
